body:
  text: 小引經方尚矣唐宋以後始有通行之時方約其法於十劑所謂宣通補泄輕重滑澀燥濕是也昔賢加入寒熱共成十有二劑雖曰平淺而亦本之經方輕可散實仿於麻黃葛根諸湯宣可決壅仿於梔豉瓜蒂二方通可行滯仿於五苓十棗之屬瀉可去閉仿於陷胸承氣抵當之屬膽導蜜煎滑可去著之劑也赤石脂桃花湯澀可固脫之劑也附子湯理中丸補可扶弱之劑也禹餘糧代赭石重可鎮怯之劑也黃連阿膠湯濕可潤燥之劑也麻黃連軺赤小豆湯燥可去濕之劑也白虎黃連瀉心等湯寒可勝熱之劑也白通四逆諸湯熱可制寒之劑也余曏者彙集經方而韻注之名為真方歌括限於貲而未梓繕本雖多而刀圭家每秘而弗傳大為恨事辛酉歲到直供職適夏間大雨捧檄勘災以勞構疾脈脫而厥諸醫無一得病情者迨夜半陽氣稍回神識稍清自定方劑而愈時溫虐流行因余之病而知誤於藥者堪憫焉蓋醫者生人之術也一有所誤即為殺人余濫竽人後諸多有志而未逮而可以行其不忍人之心不必待諸異時者醫之為道也向著真方歌括非內經即仲景恐人重視而畏避之每值公餘檢閱時方不下三千首除雜沓膚淺之外擇其切當精純人人共知者不可多得僅收一百八首而韻之分為十二劑以便查閱又採集羅東逸柯韻伯諸論及餘二十年讀書臨症獨得之妙一一詳於歌后顏曰時方歌括為中人以下立法徐可引以語上之道也至於張景岳新方八陣匯藥治病不足言方緣一時盛行余友林雨蒼俯以從時韻既成帙共商註解業經梓行亦不遽棄別其名曰俗方歌括此三種者淺深高下明者自知之嘉慶辛酉孟秋修園陳念祖題於保陽差次凡例一是書前曾託名葉天士今特收回一是書論證治法悉遵古訓絕無臆說浮談以時法列於前仲師法列於後由淺入深之意也一坊刻萬病回春嵩厓尊生古今醫統東醫寶鑑等書所列病症不可謂不詳而臨時查對絕少符合即有合處亦不應驗蓋以逐末而忘其本也試觀內經難經傷寒論金匱要略每症只寥寥數語何所不包可知立言貴得其要也此書如怔忡頭痛歷節諸症非遺之也怔忡求之虛癆頭痛有邪求之傷寒無邪求之眩暈虛癆歷節尋其屬風屬濕屬虛而治之所以寓活法也學醫始基在於入門入門正則始終皆正入門錯則始終皆錯此書闡明聖法為入門之准不在詳備若得其秘訣未嘗不詳備也有症見於此而治詳於彼者有論此症而彼症合而並論者有論彼症絕未明言此症而即為此症之金針者實無他訣唯其熟而已熟則生巧自有左右逢原之妙論中所列諸方第三卷第四卷俱載弗遺唯傷寒論金匱要略方非熟讀原文不能領會此書偶有闕而未載者欲人於原文中尋其妙義闕之即所以引之也閱者鑑子之苦心焉一方後附論或採前言或錄一得視諸書較見簡括閱者自知
