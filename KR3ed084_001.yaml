body:
  text: 卷上補可扶弱四君子湯治面色痿白言語輕微四肢無力脈來虛弱者若內熱或飲食難化作酸乃屬虛火須加乾薑六君子湯治脾胃虛弱痞滿痰多香砂六君子湯治氣虛腫滿痰飲結聚脾胃不和變生諸症者五味異功散健脾進食為病後調補之良方苓朮參甘四味同人參茯苓白朮各二錢炙甘草一錢加薑棗煎名四君子湯方名君子取謙沖增來陳夏痰涎滌前方加陳皮一錢順氣半夏二錢除痰名六君子湯再入香砂痞滿通六君子湯加木香砂仁各八分以行氣消脹名為香砂六君子湯水穀精微陰以化飲食增則津液旺充血生精以復其真陰之不足陽和布護氣斯充食入於陰氣長於陽晝夜循環周於內外若刪半夏六君內錢氏書中有異功六君子湯內去半夏名五味異功散陳修園曰胃氣為生人之本參朮苓草從容和緩補中宮土氣達於上下四旁而五臟六腑皆以受氣故一切虛證皆以此方為主若加陳皮則有行滯進食之效再加半夏即有除痰寬脹之功再加木香砂仁則行氣之藥多於補守凡腫滿痰飲結聚等證無不速除此猶人所易知也而為數方之主則功在人參人皆曰人參補氣補陽溫藥藉之以盡其力量而余則曰人參補陰養液燥藥得之則臻於和平故理中湯中薑朮二味氣勝於味以扶陽參草二味味勝於氣以和陰此湯以乾薑易茯苓去其辛而取其淡亦陰陽兼調之和劑也凡醫家病家俱重人參全未識人參之性皆不讀神農本草經之過也今録本草經原文而釋之或數百年之誤於茲而一正也乎按神農本草經云人參氣味甘微寒無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年原文只此三十七字其提綱云主補五臟以五臟屬陰也精神不安魂魄不定驚悸不止目不明心智不足皆陰虛為亢陽所擾也今五臟得甘寒之助則有安之定之止之明之開之益之之效矣曰邪氣者非指外邪而言乃陰虛而壯火食氣火氣即邪氣也今五臟得寒甘之助則邪氣除矣余細按經文無一字言及溫補回陽之性仲景於汗吐下陰傷之證用之以救津液而一切回陽方中絶不加此陰柔之品反緩姜附之功故四逆湯通脈四逆湯為回陽第一方皆不用人參而四逆加人參湯以其利止亡血而加之也茯苓四逆湯用之者以其煩燥在汗下之後也今人輒云以人參回陽此說倡之宋元以後而大盛於薛立齊張景嶽李士材輩而李時珍本草綱目浮泛雜沓愈亂經旨學者必於此等書焚去方可與言醫道仲景一百一十三方中用人參者只有一十八方新加湯小柴胡湯柴胡桂枝湯桂枝人參湯半夏瀉心湯四逆加人參湯茯苓四逆湯生薑瀉心湯黃連湯旋覆代赭石湯乾薑黃連黃芩人參湯厚朴生薑半夏人參湯白虎加人參湯竹葉石膏湯炙甘草湯皆因汗吐下之後亡其津液取其甘寒以救陰也抑或辛剛劑中取其養陰以配陽即理中湯吳萸湯附子湯三方之法也香砂六君子湯論柯韻伯曰經云壯氣行則愈怯者著而為病蓋人在氣交之中因氣而生而生氣總以胃氣為本食入於陰長氣於陽晝夜循環周於內外一息不運便有積聚或脹滿不食或生痰留飲因而肌肉消瘦喘咳嘔噦諸證蜂起而神機化絶矣四君子氣分之總方也人參致沖和之氣白朮培中宮茯苓清治節甘草調五臟諸氣既治病從何來然撥亂反正又不能無為而治必舉夫行氣之品以輔之則補品不至泥而不行故加陳皮以利肺金之逆氣半夏以疏脾土之濕氣而痰飲可除也加木香以行三焦之滯氣砂仁以通脾腎之元氣而膹郁可開也四君得四輔而補力倍宣四輔有四君而元氣大振相須而益彰者乎補中益氣湯治陰虛內熱頭痛口渴表熱自汗不任風寒脈洪大心煩不安四肢困倦懶於言語無氣以動動則氣高而喘補中參草術歸陳耆得升柴用更神黃耆蜜炙錢半人參甘草炙白朮各一錢陳皮歸身各五分升麻柴胡各三分加薑棗煎勞倦內傷功獨擅陽虛外感亦堪珍柯韻伯曰仲景有建中理中二法風木內干於中氣用建中湯寒水內凌於中氣用理中湯至若勞倦形氣衰少陰虛而生內熱陰者太陰也表症頗同外感惟東垣知其為勞倦傷脾穀氣不盛陽氣下陷於陰而發熱故制補中之劑得發表之品而中自安益氣之劑賴清氣之品而氣益倍此用藥相須之妙也是方也用以補脾使地道卑而上行亦可以補心肺損其肺者益其氣損其心者調其榮衛也亦可以補肝木鬱則達之也惟不宜於腎陰虛於下者不宜升陽虛於下者更不宜升也當歸補血湯血虛身熱有奇方古有當歸補血湯五倍黃耆歸一分分去聲黃耆一兩當歸二錢五分水煎服真陰濡布主之陽陳修園曰凡輕清之藥皆屬氣分味甘之藥皆能補中黃耆質輕而味微甘故略能補益神農本草經以為主治大風可知其性矣此方主以當歸之益血倍用黃耆之輕清走表者為導俾血虛發熱鬱於皮毛而不解者仍從微汗泄之故症象白虎不再劑而熱即如失也元人未讀本經此方因善悟暗合其效無比究之天之仁愛斯民特出此方而假手於元人非元人識力所可到也吳鶴皋以陽生陰長為解亦是庸見故特詳之保元湯治氣血虛弱之總方也小兒驚痘家虛甚最宜補養諸湯首保元參耆桂草四般存黃耆三錢人參一錢甘草一錢肉桂春夏二分秋冬六七分水煎服大人虛損兒科痘一氣腎氣為先天真元之氣胃氣為後天水穀之氣持綱語不煩柯韻伯曰保元者保守其元氣之謂也氣一而已主腎為先天真元之氣主胃為後天水穀之氣者此指發生而言也又水穀之精氣行於經隧為營氣水穀之悍氣行於脈外為衛氣大氣之積於胸中而司呼吸者為宗氣是分後天運用之元氣而為三也又外應皮毛協營衛而主一身之表者為太陽膀胱之氣內通五臟司治節而主一身之裡者為太陰肺金之氣通行內外應腠理而主一身之半表半裡者為少陽三焦之氣是以先天運行之元氣而為三也此方用黃耆和表人參固里甘草和中三氣治而元氣足矣昔李東垣以此三味能瀉火補金培土為除煩熱之聖藥鎮小兒驚效如桴鼓魏桂岩得之以治痘家陽虛頂陷血虛漿清皮薄發癢難灌難斂者始終用之以為血脫須補氣陽生則陰長有起死回生之功故名之為保元也又少佐肉桂分四時之氣而增損之謂桂能治血以推動其毒扶陽益氣以充達周身血在內引之出表則氣從內托血外散引之歸根則氣從外護參耆非桂引導不能獨樹其功桂不得甘草和平血氣亦不能緒其條理要非淺見寡聞者能窺其萬一也四君中不用白朮避其燥不用茯苓恐其滲也用桂而不用四物者惡芎之辛散歸之濕潤芍之苦寒地黃之泥滯故耳如宜燥則加苓朮宜潤加歸除煩加芍散表加芎斯又當理會矣獨參湯治元氣虛而不支脈微欲絶及婦人血崩産後血暈功建三才得令名參者參也其功與天地人並立為三故名參脈微血脫可回生人參煎取稠黏汁專任方知氣力宏柯韻伯曰世之用參者或以些少姑試之或加他味以監製之其權不重力不專人何賴以生陳修園曰陰虛不能維陽致陽氣欲脫者用此方救陰以留其陽若陽氣暴脫四肢厥冷宜用四逆湯輩若用此湯反速其危故古人多用於大汗大下之後及吐血血崩産後血暈諸證今人以人參大補陽氣皆惑於元人邪說及李時珍綱目等書不知人參生於上黨山谷遼東幽冀諸州背陽向陰其味甘中帶苦其質柔潤多液置於日中一曬便變色而易蛀其為陰藥無疑讀神農本經者自知四物湯治一切血症熱血燥諸症八珍湯氣血雙補四物歸地芍川芎血症諸方括此中當歸酒洗熟地各三錢白芍二錢川芎一錢半若與四君諸品合參朮苓草雙療氣血八珍崇四君補氣四物補血陳修園曰四物湯皆鈍滯之品不能治血之源頭即八珍湯氣血雙補亦板實不靈必善得加減之法者方效十全大補湯氣血雙補十補不一瀉法人參養榮湯治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉等症若氣血兩虛變見諸症勿論其病勿論其脈但用此湯諸症悉退桂耆加入八珍煎大補功宏號十全八珍加黃耆肉桂名十全大補湯再益志陳五味子去芎辛竄養榮專十全大補湯去川芎加陳皮五味子遠志名人參養榮湯方用白芍一錢五分人參白朮陳皮炙耆茯苓當歸桂心炙草各一錢熟地七分半遠志五分五味子十四粒薑棗水煎陳修園曰十全大補湯為氣血雙補之劑柯韻伯病其補氣而不用行氣之品則氣虛之甚者無氣以受其補補血而仍用行血之藥於其間則血虛之甚者更無血以流行正非過貶語而人參養榮湯之妙從仲景小建中湯黃耆建中湯套出何以知之以其用生芍藥為君知之也芍藥苦平破滯本瀉藥非補藥也若與甘草同用則為滋陰之品若與生薑大棗肉桂同用則為和榮衛之品若與附子乾薑同用則能急收陽氣歸根於陰又為補腎之品雖非補藥昔賢往往取為補藥之主其旨微矣此方以芍藥為君建中湯諸品俱在惡飴糖之過甜動嘔故以熟地當歸白朮人參諸種甘潤之品代飴糖以補至陰然飴糖製造主以麥蘖麥為心谷心者化血而奉生身也故又代以遠志之入心麥造為蘖能疏遠而暢氣也故又代以陳皮之行氣建中湯中原有胸滿去棗加茯苓之例故用茯苓細思其用意無非從建中套來故氣血兩虛變見諸症者皆可服也其以養榮名湯奈何心主營而苦緩必得五味子之酸以收之使營行脈中而流於四臟非若十全八珍之泛泛無歸也按神農本經云芍藥氣味平苦無毒主治邪氣腹痛除血痹破堅積寒熱止痛利小便益氣原文只此二十九字後人妄改聖經而曰微酸是沒其苦泄攻堅之性而加以酸斂和陰之名則芍藥之真面目掩矣不知古人用法或取其苦以泄甘或取其苦以制辛或取其攻利以行補藥之滯皆善用芍藥以為補非以芍藥之補而用之也但芍藥之性略同大黃凡泄瀉必務去之此聖法也本經不明宋元以後無不誤認為酸斂之藥不得不急正之天王補心丹主治心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等症天王遺下補心丹為憫山僧請課難歸地二冬酸柏遠三參苓桔味為丸道藏偈云昔志公和尚日夜講經鄧天王憫其勞錫以此方酸棗仁當歸各一兩生地黃四兩柏子仁麥門冬天門冬各一兩遠志五錢五味子一兩白茯苓人參丹參元參桔梗各五錢煉蜜丸每兩分作十丸金箔為衣每服一丸燈心棗湯化下食遠臨臥服或作小丸亦可各書略異陳修園曰小篆心字篆文只是一倒火耳火不欲炎上故以生地黃補水使水上交於心以元參丹參二冬瀉火使火下交於腎又佐參茯以和心氣當歸以生心血二仁以安心神遠志以宣其滯五味以收其散更假桔梗之浮為嚮導心得所養而何有健忘怔忡津液乾枯舌瘡祕結之苦哉六味地黃丸主治腎精不足虛火上炎腰膝痿軟骨節痠痛足跟痛小便淋祕或不禁遺精夢泄水泛為痰自汗盜汗失血消渴頭目眩暈耳聾齒搖尺脈虛大者桂附地黃丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元衰憊臍腹疼痛夜多漩溺等症六味滋陰益腎肝茱薯丹澤地苓丸山茱肉薯蕷又名山藥各四兩丹皮澤瀉白茯苓各三兩熟地黃八兩煉蜜丸每服二錢淡鹽湯送下再加桂附扶真火前方加肉桂一兩附子一大枚炮名八味地黃丸原名腎氣丸此丸於水中補火八味功同九轉丹柯韻伯曰水體本靜而川流不息者氣之動火之用也命門有火則腎有生氣故不名溫腎而名腎氣也陳修園曰六味丸補腎水八味丸補腎氣而其妙則在於利水凡腎中之真水不足真火衰微者其溺必多二方非補腎正藥不可因薛立齊之臆說而信之近效白朮附子湯極佳其方列於熱劑宜細玩之腎氣丸金匱要略凡五見一見於第五篇云治腳氣上入小腹不仁再見於第六篇云治虛勞腰痛小便不利三見於第十二篇云夫氣短有微飲當從小便去之腎氣丸主之四見於第十三篇云治男子消渴小便反多飲一斗小便亦一斗五見於第草二篇云治婦人轉胞不得溺但利小便則愈觀此五條皆瀉少腹膀胱之疾為多不可以通治火衰之症且此方金匱不入於五水之門今人謂治水通用之劑更為可怪還少丹治脾腎俱虛飯食無味面少精采腰膝無力夢遺或少年陽痿等症楊氏傳來還少丹茱蕷苓地杜牛餐蓯蓉楮實茴巴枸遠志菖蒲味棗丸山茱肉山藥茯苓熟地黃杜仲牛膝肉蓯蓉楮實子小茴香巴戟天去骨枸杞遠志去骨石菖蒲五味子各二兩紅棗一百粒姜煮去皮核煉蜜丸如梧子大每服三錢淡鹽湯下一日兩服此丸功同八味丸火未大虛者更覺相宜陳修園曰此交通心腎之方也姜附椒桂熱藥也熱藥如夏日可畏此方諸品固腎補脾溫藥也溫藥如冬日可愛故時醫每奉為枕祕然真火大衰者斷非此方可以幸效且柔緩之品反有減食增嘔致泄之虞也龜鹿二仙膠大補精髓益氣養神人有三奇精氣神求之任督守吾真二仙膠取龜和鹿枸杞人參共四珍鹿角血者十斤龜板十斤枸杞二十兩人參十五兩用鉛鐔如法熬膏初服酒化一錢五分漸加至三錢空心服下李士材曰人有三奇精氣神生生之本也精傷無以生氣氣傷無以生神精不足者補之以味鹿得天地之陽氣最全善通督脈足於精者故能多淫而壽龜得天地之陰氣最厚善通任脈足於氣者故能伏息而壽二物氣血之屬又得造化之微異類有情竹破竹補之法也人參清食氣之壯火所以補氣中之怯枸杞滋不足之真陰所以補神中之火是方也一陰一陽無偏勝之憂入氣入血有和平之美由是精生而氣旺氣旺而神昌庶幾龜鹿之年矣故曰二仙聖愈湯治一切失血或血虛煩渴燥熱睡臥不寧五心煩熱作渴等症即四物湯加人參黃耆柯韻伯曰此方取參耆配四物以治陰虛血脫等症蓋陰陽互為其根陰虛則陽無所附所以煩熱燥渴而陽亦亡氣血相為表裡血脫則氣無所歸所以睡臥不寧而氣亦脫然陰虛無驟補之法計在存陽血脫有生血之機必先補氣此陽生陰長血隨氣行之理也故曰陰虛則無氣無氣則死矣前輩治陰虛用八珍十全卒不獲效者因甘草之甘不達下焦白朮之燥不利腎陰茯苓滲泄礙乎生升肉桂辛熱動其虛火此六味皆醇厚和平而滋潤服之則氣血疏通內外調和合於聖度矣陳修園曰此方為一切失血之良藥及血後煩熱睡臥不寧五心煩熱作渴可以兼治其止血妙在川芎一味其退熱妙在黃耆一味其熟睡止渴妙在人參一味柯韻伯以參耆為氣分陽藥取配四物等語亦未免為俗說所囿也經云中焦受氣取汁變化而赤是謂血血之流行半隨衝任而行於經絡半散於脈外而充於肌腠皮毛凡一切失血之症其血不能中行於經絡外散於肌腠皮毛故從竅道湧出不止妙得川芎之溫行又有當歸以濡之俾血仍行於經絡得川芎之辛散又有黃耆以鼓之俾血仍散於肌腠皮毛源流俱清而血焉有不止者乎至於血後燥熱得黃耆以微汗之則表氣和而熱退即當歸補血湯意也睡臥不寧血後陰虛所致五臟屬陰唯人參能兼補之五臟之陰長則五心之煩熱自除煩熱既除則津液自生燥渴自已諸症可以漸退矣自宋元以後無一人能讀本草經此方疑有神助非制方人識力所到也柯韻伯卓卓不凡但未讀本草經未免闕憾五臟有血六腑無血觀剖諸獸腹心下夾脊包絡中多血肝內多血心脾肺腎中各有血六腑無血近時以吐血多者為吐胃血皆耳食昔醫之誤凡五臟血吐出一絲即死若吐血衄血下血及婦人血崩皆是行於經絡與散於肌腠之血溢於上為吐衄滲於下為崩下也十味地黃丸治上熱下寒服涼藥更甚等症即桂附地黃丸倍用桂附加芍藥元參各四兩陳修園曰此孫真人千金翼方也芍藥能斂木中之火氣以歸其根元參能啓水中之精氣以交於上故加此二味於八味丸中一以速附子之下行一以防肉桂之上僣凡口舌等瘡面紅目赤齒牙浮動服涼藥而更甚者此為祕法正元丹治命門火衰不能生土吐利厥冷有時陰火上衝則頭面赤熱眩暈噁心濁氣逆滿則胸脅刺痛臍肚脹急即四君子湯加山藥黃耆人參三兩用川附子一兩五錢煮汁收入去附子黃耆一兩五錢用川芎一兩酒煮收入去川芎山藥一兩用乾薑三錢煎汁收入去乾薑白朮二兩用陳皮五錢煮汁收入去陳皮茯苓二兩用肉桂六錢酒煮汁收入去肉桂甘草一兩五錢用烏藥一兩煮汁收入去烏藥上五味除茯苓用文武火緩緩焙乾勿炒傷藥性為末每服三錢水一盞姜三片紅棗一枚煎數沸入益一捻和滓調服服後飲熱酒一杯以助藥力按煉蜜為丸每服三錢更妙陳修園曰此方出虞天益製藥祕旨頗有意義張石頑醫通之注解亦精石頑云方本千金方一十三味卻取附子等辛燥之性逐味分制四君耆薯之中其力雖稍遜原方一籌然雄烈之味既去真滓無形生化有形允為溫補少火之馴劑而無食氣之虞真千金之功臣也歸脾湯治思慮傷脾不能攝血致血妄行或健忘怔忡驚怪盜汗嗜臥少食或大便不調心脾疼痛瘧痢鬱結或因病用藥失宜克伐傷脾以致變症者最宜之歸脾湯內術耆神白朮黃耆炙茯神各二錢參志香甘與棗仁人參酸棗仁炒研各二錢遠志木香各五分甘草炙一錢龍眼當歸十味外龍眼肉五枚當歸二錢若加熟地失其真本方只十味薛氏加山梔丹皮各一錢名為加味歸脾湯治脾虛發熱頗效近醫加熟地黃名黑歸脾湯則支離甚矣陳修園曰此方彙集補藥雖無深義然亦純而不雜浙江江蘇市醫加入熟地黃一味名為黑歸脾湯則不通極矣內經陰陽二字所包甚廣而第就臟腑而言言陽盛陽衰者指陽明而言言陰盛陰衰者指大陰而言太陰者脾也神農本經補陰與補中二字互用蓋以陰者中之守也陰虛即是中虛中虛即是陰虛後人錯認其旨謂參耆白朮為氣藥補陽歸地芍藥為血藥補陰謂薑桂附子為熱藥補陽謂知柏生地為寒藥補陰滿腔都是李士材薛立齊張景嶽之庸論則終身為誤人之庸醫矣今即以此方言之方中諸品甘溫補脾即是補陰之劑而命方不為補而為歸者歸還其所固有也妙在遠志入心以治其源即內經痿論所謂心主身之血脈生成篇所謂諸血者皆屬於心之旨也木香入脾以治其流本草經名為五香五為土數香又入脾藉其盛氣以噓血歸脾之義也方雖平鈍頗得金匱要略調以甘藥令飲食增進漸能充血生精以復真陰之不足若加入熟地黃則甘緩劑中雜以壅滯之品恐緩者過緩壅者增壅脾氣日困不能輸精入腎欲補腎反以戕腎矣又有逍遙散加入熟地黃名為黑逍遙散更為無知妄作吾知數年後必將以四君子湯六君子湯生脈散等方加入此味名為黑四君子黑六君子黑生脈散矣堪發一嘆大補陰丸降陰火補腎水大補陰丸絶妙方向盲問道詆他涼地黃知柏滋兼降龜板沉潛制亢陽黃柏知母各四兩俱用鹽酒炒熟地黃酒潤龜板酥炙黃各六兩為末用豬脊髓蒸熟和煉蜜為丸桐子大每服五六十丸空心薑湯鹽湯黃酒隨意送下陳修園曰知柏寒能除熱苦能降火苦者必燥故用豬脊髓以潤之熟地以滋之此治陰虛發熱之恆法也然除熱只用涼藥猶非探源之治方中以龜板為主是介以潛陽法丹溪此方較六味地黃丸之力更優李士材薛立齊張景嶽輩以苦寒而置之猶未參透造化陰陽之妙也虎潛丸治痿神方即前方加味黃柏知母熟地各三兩龜板四兩白芍當歸牛膝各二兩虎脛骨瑣陽陳皮各一兩五錢乾薑五錢酒煮羯羊肉為丸如桐子大每服五六十丸薑湯鹽湯或黃酒送下加味虎潛丸治諸虛不足腰腿疼痛行步無力壯元氣滋腎水即前方再加味照虎潛丸方再加人參黃耆杜仲菟絲子茯苓破故紙山藥枸杞去羊肉乾姜以豬脊髓蒸熟同煉蜜為丸如桐子大服法照前陳修園曰觀此二方可知苦寒之功用神妙非薛立齊張景嶽輩所可管窺喻嘉言寓意草謂苦寒培生氣誠見道之言也全鹿丸能補諸虛百損五勞七傷功效不能盡述人制一料服之可以延年一紀其法須四人共制一鹿分而服之逾年又共制之四人共制四年則每人得一全鹿若一人獨制一料恐久留變壞藥力不全矣法用中鹿一隻宰好將肚雜洗淨同鹿肉加酒煮熟將肉橫切焙乾為末取皮同雜仍入原湯煮膏和藥末肉未加煉蜜為丸其骨須酥炙為末同入之人參白朮茯苓炙草當歸川芎生地熟黃耆天冬麥冬枸杞杜仲牛膝山藥芡實菟絲子五味子瑣陽肉蓯蓉破故紙巴戟肉葫蘆巴川續斷覆盆子楮實子秋石陳皮各一斤川椒小茴香沉香青鹽各半斤法須精製諸藥為未候鹿膠成就和搗為丸梧桐子大焙乾用生絹作小袋五十條每條約乘一斤懸直透風處用盡一袋又取一袋陰濕天須用火烘一二次為妙每服八九十丸空心臨臥薑湯鹽湯送下冬月酒下陳修園曰此方冠冕堂皇富貴之家無不喜好修園不韻不注明者自知然亦有不得不言者肥厚痰多之人內蘊濕熱者體此丸即犯膏粱無厭發癰疽之戒也惟用瘦過於勞苦及自奉淡薄之人或高年瘦弱用此早晚兩服以代點心不無補益耳重可鎮法磁砂丸治神水寬大漸散昏如霧露中行漸睹空中有黑花睹物成二體及內障神水淡緑色淡白色又治耳鳴及耳聾柯韻伯云治聾癲狂癇如神磁砂丸最媾陰陽神麯能俾穀氣昌磁石二兩硃砂一兩神麯三兩生更以一兩水和作餅煮浮入前藥煉蜜為丸內障黑花聾並治若醫癲癇有奇長王又原曰經曰五臟六腑之精皆上注於目則目之能視者氣也目之所以能視者精也腎惟藏精故神水發於腎心為離照故神光發於心光發陽而外映有陰精以為守則不散而常明水發陰而凝結有陽氣以為布則洞悉而不窮惟心腎有虧致神水乾涸神光短少昏眊內障諸症所由作也千金以磁石直入腎經收散失之神性能引鐵吸肺金之氣歸藏腎水硃砂體陽而性陰能納浮游之火而安神明水能鑑火能燭水火相濟而光華不四射與然目受臟腑之精精俾於谷神麯能消化五穀則精易成矣蓋神水散大緩則不收賴鎮墮之品疾收而吸引之故為急救之劑也其治耳鳴耳聾等症亦以鎮墮之功能制虛陽之上奔耳柯韻伯曰此丸治癲癇之聖劑蓋狂癡是心腎脾三臟之病心藏神脾藏意與智腎藏精與志心者神明之主也經云主不明則十有二官危使道閉塞而不通形乃大傷即此謂也然主何以不明也心法離而屬火真水藏其中若天一之真水不足地二之虛火要行所謂天氣者蔽塞地氣者冒明日月不明邪害空竅故目多妄見而作此奇疾也非金石之重劑以鎮之狂必不止硃砂稟南方之赤色入通於心能降無根之火而安神明磁石稟北方之黑色入通於腎吸肺金之氣以生精墜炎土之火以定志二石體重而主降性寒而滋陰志同道合奏功可立俟矣神麯推陳致新上交心神下達腎志以生意智且食入於陰長氣於陽奪其食則已此內經治狂法也食消則意智明而精神治是用神麯之旨乎煉蜜和丸又甘以緩之矣蘇子降氣湯治痰嗽氣喘降氣湯中蘇半歸橘前沉朴草姜依風寒咳嗽痰涎喘暴病無妨任指揮蘇子橘皮半夏當歸前胡厚朴各一錢沉香炙甘草各五分加姜煎一方無沉香加肉桂蘇子前胡橘皮半夏降氣氣行則痰行也風寒鬱於皮毛則肺氣逆而為喘數藥妙能解表氣以血為家喘則流蕩而忘返故用當歸以補血喘則氣急故用甘草以緩其急然出氣者肺也納氣者腎也故用沉香之納氣入腎或肉桂之引火歸元為引導陳修園曰仲景云喘家作桂枝湯加厚朴杏子佳蘇子降氣湯即從此湯套出時醫皆謂切於時用然有若似聖人惟曾子以為不可耳硃砂安神丸治心神昏亂驚悸怔忡寤寐不安安神丸劑亦尋常歸草朱連生地黃硃砂另研黃連各半兩生地黃三錢當歸甘草各二錢為末酒炮蒸餅丸如麻子硃砂為衣每服三十丸臨臥時津液下昏亂怔忡時不寐操存孟子云操則存須令守其鄉陳修園曰東垣之方多雜亂無紀惟此方用硃砂之重以鎮怯黃連之苦以清熱當歸之辛以噓血更取甘草之甘以制黃連之大過地黃之潤以助當歸所不及方意頗純亦堪節取四磨湯治七情感傷上氣喘急妨悶不食四磨湯治七情侵參領檳烏及黑沉人參天台烏藥檳榔黑沉香四味等分各磨濃水取十分煎二五沸空心服或下養正丹妙磨汁微煎調逆氣虛中實症此方尋王又原曰七情所感皆能為病然愈於壯者之行而成於弱者之著愚者不察一遇上氣喘急滿悶不食謂是實者宜瀉輒投破耗等藥得藥非不暫快初投之而應投之久而不應矣夫呼出為陽吸入為陰肺陽氣旺則清肅下行歸於腎陰是氣有所收攝不復散而上逆若正氣既衰邪氣必盛縱欲削堅破滯邪氣必不伏方用人參瀉壯火以扶正氣沉香納之於腎而後以檳榔烏藥從而導之所謂實必顧虛瀉必先補也四品氣味俱厚磨則取其味之全煎則取其氣之達氣味齊到效如桴鼓矣其下養正丹者暖腎藥也本方補肺氣養正丹溫腎氣鎮攝歸根喘急遄已矣黑錫丹治脾元久冷上實下虛胸中痰飲或上攻頭目及奔豚上氣兩腳膨脹並陰陽氣不升降五種水氣腳氣上攻或卒暴中風痰潮上膈等症鎮納浮陽黑錫丹硫黃入錫結成團葫蘆故紙茴沉木桂附金鈴肉蔻丸黑錫硫黃各三兩同炒結砂研至無聲為度胡蘆巴沉香熟附子肉桂各半兩茴香破故紙肉豆蔻金鈴子去核木香各一兩研末酒煮曲糊為丸梧子大陰乾以布袋擦令光瑩每服四十丸薑湯下陳修園曰此方一派辛溫之中雜以金鈴子之苦寒為導妙不可言喻嘉言曰凡遇陰火逆沖真陽暴脫氣喘痰鳴之急證舍此丹別無方法即痘疹各種壞症服之無不回生豫每用小囊佩帶隨身恐遇急症不及取藥且欲吾身元氣溫養其藥藉手效靈厥功歷歷可紀徐靈胎曰鎮納元氣為治喘必備之藥當蓄在平時非一時所能驟合也既備此丹如靈砂丹養正丹之類可不再備全真一氣湯滋陰降火之神方即生脈散方見寒劑加熟地五七錢或一兩白朮三錢牛膝附子各二錢水煎服陳修園曰此馮氏錦囊得意之方無症不用俱云神效其實大言欺人修園不信也方以熟地滋腎水之干麥冬五味潤肺金之燥人參白朮補中宮土氣俾上能散津於肺下能輸精於腎附子性溫以補火牛膝引火氣下行不為食氣之壯火而為生氣之少火從桂附地黃丸套來與景嶽鎮陰煎同意然駁雜淺陋不可以治大病惟痘科之逆症相宜以諸藥皆多液之品添漿最速也二加龍骨湯治虛勞不足男子失精女子夢交吐血下利清穀浮熱汗出夜不成寐等症即桂枝加龍骨牡蠣湯方見真方歌括虛勞門去桂枝加白薇一錢五分附子一錢白芍生薑各三錢炙甘草一錢五分細棗三枚龍骨三錢生牡蠣四錢白薇一錢五分附子一錢水煎服陳修園曰此方探造化陰陽之妙用之得法效如桴鼓庸醫疑生薑之過散龍骨牡蠣之過斂置而不用以致歸脾湯人參養榮湯等後來居上詢可浩嘆宣聖云民可使由之不可使知之此方所以然之妙修園亦不說也豫友林雨蒼有神農本草經三注採集豫之注解頗多逐味雜對後再讀此方便覺有味輕可去實即發汗解肌之發也九味羌活湯一名沖和湯四時感冒發散之通劑沖和湯內用防風羌芷辛蒼草與芎汗本於陰芩地妙三陽解表一方通羌活防風蒼朮各錢半白芷川芎黃芩生地甘草各二錢細辛九分加生薑蔥白煎陳修園曰羌活散太陽之寒為撥亂反正之藥能除頭痛項強及一身盡痛無汗者以此為主防風驅太陽之風能除頭痛項強惡風自汗者以此為主又恐風寒不解傳入他經以白芷斷陽明之路黃芩斷少陽之路蒼朮斷大陰之路多汗者易白朮川芎斷厥陰之路細辛斷少陰之路又以甘草協和諸藥使和衷共濟也佐以生地者汗化於液補陰即托邪之法也人參敗毒散治傷寒瘟疫風濕風眩拘蜷風痰頭痛目眩四肢痛增寒壯熱項強睛疼老人小兒皆可服人參敗毒草芩芎羌獨柴前枳桔同瘟疫傷寒噤口痢托邪扶正有奇功人參茯苓枳殼桔梗柴胡前胡羌活獨活川芎各一錢甘草五分加生薑煎煩熱口乾加黃芩汪訒庵曰羌活理太陽遊風獨活理少陰伏風兼能去濕除痛川芎柴胡和血升清枳殼前胡行痰降氣甘桔參茯清肺強胃主之以人參者扶正氣以匡邪也加陳倉米三錢名倉廩湯治噤口痢香蘇飲治四時感冒發表輕劑香蘇飲內草陳皮紫蘇葉二錢香附炒陳皮各一錢五分炙草一錢加薑蔥水煎服微覆以汗汗顧陰陽用頗奇紫蘇血中氣藥香附氣中血藥甘草兼調氣血陳皮宣邪氣之郁從皮毛而散視時方頗高一格艽芥芎防蔓子入再加秦艽荊芥川芎蔓荊子各一錢醫學心悟名加味香蘇飲解肌活套亦須知陳修園曰仲景麻桂諸湯從無他方可代後人易以九味羌活湯人參敗毒散及此湯看似平穩其實辛烈失法服之得汗有二慮一慮辛散過汗重為亡陽輕則為汗漏也一慮辛散逼汗動臟氣而為鼻衄傷津液而為熱不退渴不止也服之不得汗亦有二慮一慮辛散煽動內火助邪氣入里而為狂熱不得寐一慮辛散拔動腎根致邪氣入陰而為脈細但欲寐也若用仲景之法則無是慮升麻葛根湯治陽明表熱下利兼治痘疹初發錢氏升麻葛根湯芍藥甘草合成方升麻三錢葛根芍藥各二錢炙草一錢陽明發熱兼頭痛及目痛鼻乾不得臥等症下利生斑疹痘良新訂症同太陽而目痛鼻乾不眠稱陽明者是陽明自病而非太陽轉屬也此方仿仲景葛根湯惡薑桂之辛熱大棗之甘壅而去之以升麻代麻黃便是陽明表劑與太陽表劑迥別葛根甘涼生津去實挾升麻可以托散本經自病之肌熱並可以升提與太陽合病之自利也然陽明下利即是胃實譫語之兆故以芍藥之苦甘合用以養津液津液不幹則胃不實矣至於疹痘自里達表內外皆熱之症初起亦須涼解小續命湯六經中風之通劑小續命湯子金桂附芎麻黃參芍杏防風黃芩防己兼甘草風中諸經以此通通治六經中風喎邪不遂語言謇滯及剛柔二痙亦治厥陰風瀉防風一錢一分桂枝麻黃人參酒芍杏仁川芎黃芩防己甘草各八分附子四分薑棗煎服陳修園曰天地之噫氣為風和風則生長萬物疾風則摧折萬物風之傷人者皆帶嚴寒肅殺之氣故此方桂芍姜草即傷寒論之桂枝湯麻杏甘草即傷寒論之麻黃湯二方合用立法周到然風動則火升故用黃芩以降火風勝則液傷故用人參以生液血行風自滅故用芎芍以行血防風驅周身之風為撥亂返正之要藥附子補腎命之根為勝邪固本之靈丹防己紋如車輻有升轉循環之用以通大經小絡藥品雖多而絲絲入扣孫真人詢仲景下之一人也地黃飲子治舌喑不能言足廢不能行此謂少陰氣厥不至急當溫之名曰痱症地黃飲子少陰方桂附蓉苓並地黃麥味遠蒲萸戟斛薄荷加入煮須詳肉桂附子肉蓯蓉茯苓熟地黃麥冬五味子遠志菖蒲山茱萸巴戟天石斛各五分薄荷葉七片水一杯二分煎八分溫服陳修園曰命火為水中之火昔人名為龍火其火一升故舌強不語以腎脈榮於舌本也火一升而不返故猝倒不省人事以丹田之氣欲化作冷風而去也方用桂附蓯蓉巴戟以導之龍升則水從之故痰涎如湧以痰之本則為水也方用熟地茯苓山藥石斛以安之火迸於心則神識昏迷方用遠志菖蒲以開之風動則火發方用麥冬五味子以清斂之腎主通身之骨腎病則骨不勝任故足廢不能行方用十二味以補之然諸藥皆質重性沉以鎮逆上之火而火由風發風則無形而行疾故用輕清之薄荷為引導又微煎數沸不令諸藥盡出重濁之味俾輕清走於陽分以散風重濁走於陰分以鎮逆劉河間制方之妙汪訒庵輩從未悟及無怪時醫之憒憒也資壽解語湯治中風脾緩舌強不語半身不遂與地黃飲子同意但彼重在腎此重在脾資壽特名解語湯專需竹瀝佐些姜羌防桂附羚羊角酸棗麻甘十味詳羌活五分防風附子羚羊角酸棗仁天麻各一錢肉桂八分甘草炙五分水二杯煎八分入竹瀝五錢生薑汁二錢調服喻嘉言治腎氣不縈於舌本加枸杞首烏天冬菊花石蒲元參陳修園曰此與前方相仿但表藥較多外證重者相宜方中羚羊角一味甚妙藿香正氣散治外受四時不正之氣內停飲食頭痛寒熱或霍亂吐瀉或作瘧疾藿香正氣芷陳蘇甘桔陳苓朮朴俱夏曲腹皮加薑棗感傷外感內傷嵐障並能驅藿香白芷大腹皮紫蘇茯苓各三兩陳皮白朮厚朴半夏曲桔梗各二兩甘草一兩每服五錢加薑棗煎陳修園曰四時不正之氣由口鼻而入與邪傷經絡者不同故不用大汗以解表只用芳香利氣之品俾其從口鼻入者仍從口鼻出也蘇芷陳腹朴梗皆以氣勝韓昌黎所謂氣勝則大小畢浮作醫等於作文也茯半術草皆甘平之品培其中氣孟子所謂正己而物正醫道通於治道也若邪傷經絡宜審六經用方不可以此混用殺人按夏月吐瀉多是伏陰在內理中湯為的方時醫因此湯有治霍亂吐瀉之例竟以為夏月吐瀉通劑實可痛恨嘉慶丁巳歲醫生鄭培齊患此症自服藿香正氣散不效延孝廉陳倬為商之再進一服少頃元氣脫散大喘大汗而死是向以誤人者今以自誤設使地下有知當亦悔不讀書之過也香薷飲三物香薷豆朴先香薷辛溫香散能入脾肺發越陽氣以散蒸熱厚朴除濕散滿扁豆清暑和脾名三物香薷飲若云熱盛益黃連名黃連香薷飲活人治中暑熱盛口渴心煩草苓五物前方加茯苓甘草名香薷五物飲還十物瓜橘參耆白朮全前方加木瓜橘皮人參黃耆白朮名十味香薷飲葉仲堅曰飲與湯稍有別服有定數者名湯時時不拘者名飲飲因渴而設用之於溫暑則最宜者也然胃惡燥脾惡濕多飲傷脾反致下利治之之法心下有水氣者發汗腹中有水氣者利小便然與其有水患而治之曷若先選其能汗能利者用之香薷芳草辛溫能發越陽氣有徹上徹下之功故治暑者君之以解表利小便佐厚朴以除濕扁豆以和中合而用之為飲飲入於胃熱去而濕不留內外之暑悉除矣若心煩口渴者去扁豆加黃連名黃連香薷飲加茯苓甘草名五物加木瓜參耆橘術名十味隨證加減盡香薷之用也然勞倦內傷必用清暑益氣內熱大渴必用人參白虎若用香薷是重虛其表而反濟其內熱矣香薷乃夏月解表之藥如冬月之麻黃氣虛者尤不可服今人不知暑傷元氣概用以代茶是開門揖盜也五積散治感冒寒邪頭疼身痛項背拘急惡寒嘔吐肚腹疼痛及寒濕客於經絡腰腳骨髓痠痛及豆瘡寒勝等症去麻黃酒煮治痢後鶴膝風甚效局方五積散神奇歸芍參芎用更奇橘芷夏苓薑桂草麻蒼枳朴與陳皮當歸麻黃蒼朮陳皮各一錢厚朴乾薑芍藥枳殼各八分半夏白芷各七分桔梗炙草茯苓肉桂人參各五分川芎四分水二鍾姜三片蔥白三莖煎八分溫服陳修園曰表裡俱寒外而頭項強痛內而肚腹亦痛較桂枝症更甚者服此湯小柴胡去參加青皮湯治瘧病初起即小柴胡湯方見真方歌括上卷少陽編去人參加青皮二錢陳修園曰瘧症初起忌用人參時醫之伎倆也然相沿既久亦姑聽之第初起無汗者宜加麻黃二錢多汗者宜加白芍桂枝各二錢寒多者宜加桂枝幹姜各二錢熱多者宜加貝母知母各二錢口渴者去半夏加栝蔞根二錢五分小柴胡加常山湯凡瘧症三發之後皆可服天明時一服瘧未發前一時一服神效即柴胡湯加常山三錢生用不炒如服後欲吐者即以手指探吐痰吐盡則愈陳修園曰常山一味時醫謂為堵截之品誤信李士材薛立齊之說不敢用之而不知是從陰透陽逐邪外出之妙品仲景用其苗名蜀漆後世用其根實先民之矩矱即雲湧吐而正取其吐去積瘧則瘧止宣可決壅以君召臣曰宣宣者湧吐之劑也又鬱而不散為壅必宣以散之如生薑橘皮之屬是也又納藥鼻中以取嚏亦是稀涎湯治風痰不下喉中如牽鋸或中濕腫滿通關散稀涎皂半草礬班皂角一個大半夏十四粒炙甘草一錢白礬二錢為末每服一錢用生薑少許沖溫水灌之得吐痰涎即醒此奪門之兵也風初中時宜用之直中痰潮此斬關更有通關辛皂末細辛皂角為未吹鼻中名通關散吹來得嚏保還生卒中者用此吹鼻有嚏者可治無嚏者為肺氣已絶陳修園曰頑痰上塞咽喉危在頃刻當以此攻之然痰為有形也痰厥宜湧吐以出其痰氣無形也氣厥宜取嚏以宣其氣二者皆所以開其閉也若脫症昏倒不省人事亦用此法以開之是速其死也慎之越鞠丸治臟腑一切痰食氣血諸郁為痛為嘔為脹為利者六郁宜施越鞠丸芎蒼曲附並梔餐食停氣血濕痰火得此調和頃刻安吳鶴皋曰香附開氣鬱撫芎調血鬱蒼朮燥濕鬱梔子清火鬱神麯消食鬱各等分麥芽煎湯泛丸又濕鬱加茯苓白芷火鬱加青黛痰鬱加星夏栝蔞海石血鬱加桃仁紅花氣鬱加木香檳榔食鬱加麥芽山楂挾寒加吳茱萸季楚重曰經云太陰不收肺氣焦滿又云諸氣膹郁皆屬於肺然肺氣之布必由胃氣之輸胃氣之運必本三焦之化甚至為痛為嘔為脹為利莫非胃氣不宣三焦失職所致方中君以香附快氣調肺之拂鬱臣以蒼朮開發強胃而資生神麯佐化水穀梔子清郁導火於以達肺騰胃而清三焦尤妙撫芎之辛直入肝膽以助妙用則少陽之生氣上朝而營衛和太陰之收氣下肅而精氣化此丹溪因五郁之法而變通者也然五郁之中金木為尤甚前人用逍遙散調肝之郁兼清火滋陰瀉白散清肺之郁兼潤燥降逆要以木鬱上衝即為火金鬱斂澀即為燥也如陰虛不知滋水氣虛不知化液是又不善用越鞠矣陳修園曰諸病起於郁者難醫時醫每以鬱金統治之是徇名之誤也此藥本經不載唐本有之唐本云氣味苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡原文只此二十四字大抵破血下氣及外敷之品無一字言及解鬱録此以為誤用者戒逍遙散治肝家血虛火旺頭痛目眩頰赤口苦倦怠煩渴抑鬱不樂兩脅作痛寒熱小腹重墜婦人經水不調脈弦大而虛逍遙散用芍當歸術草柴苓慎勿違柴胡當歸白芍白朮茯苓各一錢甘草炙五分加煨姜薄荷煎散郁除蒸功最捷醫貫曰方中柴胡薄荷二味最妙蓋木喜風搖寒即摧萎溫即發生木鬱則火鬱火鬱則土鬱土鬱則金鬱金鬱則水鬱五行相因自然之理也余以一方治木鬱而諸郁皆解逍遙散是也丹梔加入有元機如丹皮梔子名八味逍遙散治肝傷血少經枯趙羽皇曰此治肝鬱之病而肝之所以郁者其說有二一為土虛不能升木也一為血少不能養肝也蓋肝為木氣全賴土以滋培水以灌溉若中土虛則木不升而鬱陰血少則肝不滋而枯方用白朮茯苓者助土德以升木也當歸芍藥者益榮血以養肝也薄荷解熱甘草和平獨柴胡一味一以為厥陰之報使一以升發諸陽經云木鬱則達之遂其曲直之性故名之曰逍遙通可行滯火氣鬱滯宜從小便利之通為輕泄為重也導赤散治心熱口糜舌瘡小便黃赤莖中痛熱急不通導赤原來地與通草梢竹葉四般攻口糜莖痛兼淋瀝瀉火功歸補水中等分煎生地涼心血竹葉清心氣木通瀉心火而入小腸草梢達腎莖而止痛季楚重曰瀉心湯用黃連所以治實邪實邪責木之有餘瀉子以清母也導赤散用地黃所以治虛邪虛邪責水之不足壯水以制火也五淋散治膀胱有熱水道不通淋澀不出或尿如豆汁或成砂石或為膏汁或熱怫便血五淋散用草梔仁歸芍茯苓亦共珍赤茯苓三錢芍藥山梔仁各二錢當歸細甘草各一錢四分加燈心水煎服氣化原由陰以育調行水道妙通神柯韻伯曰經云膀胱者州都之官津液藏焉又申其旨曰氣化則能出何也蓋膀胱有上口而無下口能納而不出惟氣為水母必太陽之氣化而膀胱之溺始出是水道固藉無形之氣化不專責有形之州都矣夫五臟之水火皆生於氣氣平則為少火少火生氣而氣即為水水精四布下輸膀胱源清則流潔矣氣有餘則為壯火壯火食氣則化源無藉為癃閉淋澀膏淋豆汁砂石膿血而水道為之不利矣總由化源之不清非決瀆之失職若以八正舟車禹功浚川等劑治之五臟之陰虛太陽之氣化絶矣故急用梔苓治心肺以通上焦之氣而五志火清歸芍滋肝腎以安下焦之氣而五臟陰復甘草調中焦之氣而陰陽分清則太陽之氣自化而膀胱之水潔矣此治本之計法之盡善者也通關丸又名滋腎丸治下焦濕熱小便點滴不通以致腹悶欲吐溺癃不渴下焦疏病在下焦故不渴宜清下焦之熱疏通水道知柏同行肉桂扶黃柏知母俱酒炒各二兩肉桂二錢煉蜜丸如桐子大每服五十丸空心白湯下名通關丸丸號通關能利水又名滋腎補陰虛原方為肺痿聲嘶喉痹咳血煩躁而設東垣借用以治癃閉喘脹陳修園曰溺竅一名氣門以溺由氣化而出也氣者陽也陽得陰則化若熱結下焦上無口渴之症以此丸清下焦之熱則小便如湧矣此證若口渴宜濟生腎氣丸金匱瞿麥丸主之然又有巧法焉譬之滴水之器閉其上竅則下竅不通去其上竅之閉則水自流矣用補中益氣湯或吐法甚妙又於利水藥中入麻黃之猛能通陽氣於至陰之地配杏仁之降俾肺氣下達州都此從高原以導之其應如響虛人以人參麻黃各一兩水煎服亦妙夏月以蘇葉防風杏仁各三錢水煎溫服覆取微似汗亦妙六一散一名天水散治夏時中暑熱傷元氣內外俱熱無氣以動煩渴欲飲腸胃枯涸者又能催生下乳積聚水蓄裡急後重暴注下迫者宜之加硃砂三錢名益元散六一散中滑石甘熱邪表裡可兼探滑石六兩甘草一兩為末燈心湯下亦有用新汲水下者益元散再入硃砂研加硃砂三錢名益元散瀉北元機在補南柯韻伯曰元氣虛而不支者死邪氣盛而無制者亦死今熱傷元氣無氣以動斯時用參耆以補氣則邪愈甚用苓連以清熱則氣更傷惟善攻熱者不使喪人元氣善補虛者不使助人邪氣必得氣味純粹之品以主之滑石稟土沖和之氣能上清水源下通水道蕩滌六腑之邪熱從小便而泄矣甘草稟草中衝和之性調和內外止渴生津用以為佐保元氣而瀉虛火則五臟自和矣然心為五臟主暑熱擾中神明不安必得硃砂以鎮之則神氣可以遽復涼水以滋之則邪熱可以急除此補心之陽寒亦通行也至於熱利初起裡急後重者宜之以滑可去著也催生下乳積聚蓄水等症同乎此義故兼治之是方也益氣而不助邪逐邪而不傷氣不負益元之名矣宜與白虎生脈三方鼎足可也泄可去閉邪盛則閉塞不通必以泄劑從大便逐之備急丸治寒氣冷食稽留胃中心腹滿痛大便不通者姜豆大黃備急丸乾薑大黃各二兩巴豆一兩去皮研如脂和蜜丸如豆大密藏勿泄氣候用每服三四丸滾水或酒下專攻閉痛及停寒兼療中惡人昏倒陰結垂危得此安柯韻伯曰大便不通當分陽結陰結陽結有承氣更衣之劑陰結又製備急白散之方金匱用此治中惡當知寒邪卒中者宜之若用於溫暑熱邪速其死矣是方允為陰結者立乾薑散中焦寒邪巴豆逐腸胃冷積大黃通地道又能解巴豆毒是有制之師也然白散治寒結在胸故用桔梗佐巴豆用吐下兩解法此則治寒結腸胃故用大黃佐乾薑巴豆以直攻其寒世徒知有溫補之法而不知有溫下之法所以但講虛寒而不議及寒實也三一承氣湯即大承氣湯方見真方歌括上卷陽明編加甘草二錢陳修園曰仲景三承氣湯盡美盡善無可加減劉河間於此方加甘草一味便逾仲景矩矱然意在調胃於外科雜症等頗亦相宜視陶節庵六一順氣湯更高一格又按張憲公云承者以卑承尊而無專成之義天尊地卑一形氣也形統於氣故地統於天形以承氣故地以承天胃土也坤之類也氣陽也乾之屬也胃為十二經之長化糟粕運精微轉味出入而成傳化之府豈專以塊然之形亦惟承此乾行不息之氣耳湯名承氣確有取義非取順氣之義也憲公此解超出前人故余既録於真方歌括後而又重録之愈讀愈覺其有味也惜其所著傷寒類疏未刊行世憲公諱孝培古吳人也溫脾湯主治錮冷在腸胃間泄瀉腹痛宜先取去然後調治不可畏虛以養病也溫脾桂附與乾薑朴草同行佐大黃泄瀉流連知痼冷溫通並用效非常附子乾薑甘草桂心厚朴各二錢大黃四分水二杯煎六分服喻嘉言曰許叔微制此方深合仲景以溫藥下之之法方中大黃一味不用則溫藥必不能下而久留之邪非攻不去多用恐溫藥不能制而洞泄或至轉劇裁酌用之真足法矣防風通聖散風熱壅盛表裡三焦皆實發表攻裡並用法防風通聖散河間大黃硝荊芥麻黃梔芍翹甘桔芎歸膏滑石薄荷芩術力偏饒大黃酒蒸芒硝防風荊芥麻黃梔子白芍連翹川芎當歸薄荷白朮各五分桔梗黃芩石膏各一錢甘草二錢滑石三錢加薑蔥煎吳鶴皋曰防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由溺而泄風淫於鬲肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎歸芍和肝血也而甘草白朮所以和胃氣而健脾劉守真氏長於治火此方之旨詳且悉哉亦治失下發斑三焦火實全方除硝黃名曰雙解散解表有防風麻黃薄荷荊芥川芎解里有石膏滑石黃芩梔子連翹復有當歸芍藥以和血桔梗白朮甘草以調氣營衛皆和表裡俱暢故曰雙解本方名曰通聖極言其用功之妙耳河間制此解利四時冬寒春溫夏熱秋燥正令傷寒凡邪在三陽表裡不解者以兩許為劑加蔥姜淡豉煎服之候汗下兼行表裡即解形氣強者兩半為劑形氣弱者五錢為劑若初服因汗少不解則為表實倍加麻黃以汗之因便硬不解則為裡實倍加硝黃以下之連進二服必令汗出下利而解也今人不知其妙以河間過用寒涼仲景傷寒初無下法棄而不用真可惜也不知其法神捷莫不應手取效從無寒中痞結之變即有一二不鮮者非法之未善則必已傳陽明故也涼膈散瀉三焦六經諸火涼膈硝黃梔子翹黃芩甘草薄荷饒再加竹葉調蜂蜜葉生竹上故治上焦膈上如焚一服消連翹一錢五分大黃酒浸芒硝甘草各一錢梔子黃芩薄荷各五分水一杯半加竹葉七片主蜜一匙煎五分服汪訒庵曰連翹薄荷竹葉以升散於上梔芩硝黃以蕩滌於下使上升下行而膈自清矣加甘草生蜜者病在膈甘以緩之也張潔古減硝黃加桔梗使諸藥緩緩而下留連膈上頗妙失笑散治産後心腹絞痛欲死或血迷心竅不省人事或胞衣不下並治心痛血滯作痛獨聖散失笑散蒲黃及五靈蒲黃五靈脂等分生研每服三錢酒煎服名失笑散暈平痛止積無停山楂二兩便糖入獨聖功同更守經山楂二兩水煎用童便砂糖調服名獨聖散吳於宣曰五靈脂甘溫走肝生用則生血蒲黃辛平入肝生用則破血佐酒煎以行其力庶可直抉厥陰之滯而有推陳致新之功甘不傷脾辛能散瘀則瘀痛惡寒發熱昏暈胸膈滿悶等症悉除直可一笑置之矣至於獨聖散獨用山楂一味不惟消食健脾功能破瘀止兒枕痛更益以砂糖之甘溫中而兼逐惡童便之咸入胞而不涼下相得而相須功力甚偉
