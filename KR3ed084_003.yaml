body:
  text: 卷下滑可去著滑者潤澤之謂也從大便降之視泄劑較輕些芍藥湯治滯下赤白便膿血後重初痢多宗芍藥湯芩連檳草桂歸香芍藥三錢黃芩黃連當歸各八分肉桂三分甘草檳榔木香各五分水煎服痢不減加大黃須知調氣兼行血後重便膿自爾康痢不減加黃去滯症分赤白藥須詳赤加芎地槐之類白益薑砂茯與蒼陳修園曰此方原無深義不過以行血則便膿自愈調氣則後重自除立法方中當歸白芍以調血木香檳榔以調氣芩連燥濕而清熱甘草調中而和藥又用肉桂之溫是反佐法芩連必有所制之而不偏也或加大黃之勇是通滯法實痛必大下之而後已也余又有加減之法肉桂色赤入血分赤痢取之為反佐而地榆川芎槐花之類亦可加入也乾薑辛熱入氣分白痢取之為反佐而蒼朮砂仁茯苓之類亦可加入也方無深義羅東逸方論求深而反淺脾約丸治臟腑不和津液偏滲於膀胱以致小便多大便祕結者燥熱便難脾約丸芍麻枳朴杏黃餐白芍火麻仁杏仁去皮尖枳實厚朴薑炒各五兩五錢蒸大黃十兩煉蜜丸如桐子大白湯送下二十丸大便利即止潤而甘緩存津液溺數腸幹得此安陳修園曰物之多脂者可以潤燥故以麻仁為君杏仁為臣破結者必以苦故以大黃之苦寒芍藥之苦平為佐行滯者必順氣故以枳實順氣而除痞厚朴順氣以泄滿為佐以蜜為丸者取其緩行而不驟也更衣丸更衣丸用薈砂研滴酒為丸服二錢硃砂五錢研如飛面蘆薈七錢研細滴酒和丸每服一錢好酒送下陰病津枯腸祕結交通水火妙通玄柯韻伯曰胃為後天之本不及固病太過亦病然太過復有陽盛陰虛之別焉兩陽合明而胃家實仲景制三承氣下之水火不交而津液亡前賢又制更衣丸以潤之古人入廁必更衣故為此丸立名用藥之義以重墜下達而奏功硃砂色赤為火體重象金味甘歸土性寒類水為丹祖永母能輸坎以填離生水以濟火是腎家之心藥也配以蘆薈黑色通腎苦味入心滋潤之質可轉濡胃燥大寒之性能下開胃關此陰中之陰詢為腎家主劑矣合以為丸有水火既濟之理水土合和之義兩者相須得效甚宏奏功甚捷真匪夷所思矣礞石滾痰丸治實熱老痰之峻劑虛寒者不宜用隱君遺下滾痰方礞石黃連及大黃少佐沉香為引導頑痰怪症力能匡青礞石三兩用焰硝一兩同入瓦罐鹽泥固濟煅至石色如金為度水飛過大黃酒蒸黃芩酒洗各八兩沉香一兩為末水丸薑湯下量虛實服服過咽即便仰臥令藥徐徐而下半日不可飲食行動待藥氣自胃口漸下二腸然後動作飲食服後喉間稠黏壅塞乃藥病相拒故也少頃藥力到自愈柯韻伯曰脾為生痰之原肺為貯痰之器此無稽之談也夫脾為胃行其津液以灌四旁而水津又上輸於肺焉能凝結而為痰惟腎為胃關關門不利故水聚而泛為痰也則當曰腎為生痰之原經云受谷者濁受氣者清清陽走五臟濁陰歸六腑肺為手太陰獨受諸氣之清而不受有形之濁則何可貯瘦惟胃為水穀之海萬物所歸稍失轉輸之職則濕熱凝結為痰依附胃中而不降當日胃為貯痰之器斯義也惟王隱公知之故治老痰之方不涉脾肺而責之胃腎二黃礞石稟中央之黃色入通中宮者也黃芩能清理胃中無形之氣大黃能蕩滌胃中有形之質然痰之為質雖滑而黏善棲泊於腸胃曲折之處而為巢穴不肯順流而下仍得緑涯而升故稱老痰二黃以滋潤之品只能直行而泄欲使委曲而導之非其所長也故選金石以佐之礞石之燥可以除其濕之本而其性之悍可以迅掃其曲折依伏之處使濁穢不得臟滯而少留此滾痰之所由名乎又慮夫關門不開仍得為老痰之巢臼沉香為扎方之色能納氣歸腎又能疏通腸胃之滯腎氣流通則水垢不留而痰不再作且使礞石不黏著於腸二黃不傷及於胃一舉而三善備所以功效若神也指迷茯苓丸治中脘留伏痰飲臂痛難舉手足不得轉移指迷最切茯苓丸風化芒硝分外看枳半合成四味藥停痰伏飲勝靈丹半夏制二兩茯苓二兩風化硝二錢半枳殼五錢四味研末薑汁糊丸桐子大每服三十丸薑湯下柯韻伯曰痰飲之本皆水也水入於胃遊溢精氣上輸於脾此自陽入陰也脾氣散精上歸於肺此地氣上升也通調水道下輸膀胱是天氣下降也水精四布五經並行是水入於經而血乃成也若陰陽不和清濁相干胃氣亂於中脾氣難於升肺氣滯於降而痰飲隨作矣痰與飲同源而有陰陽之別陽盛陰虛則水氣凝而為痰陰盛陽虛則水氣溢而為飲除痰者降氣清火是治其標補陰利水是治其本也滌飲者降氣燥濕是治其標溫腎利水是治其本也此方欲兼兩者而合治之半夏燥濕茯苓滲濕風硝軟堅枳殼利氣別於二陳之甘緩遠於礞石之峻悍殆攻中之平劑歟澀可固脫當歸六黃湯火炎汗出六黃湯醒而汗出曰自汗寐而汗出曰盜汗二地芩連柏與當生地黃熟地黃黃柏黃芩黃連當歸各等分黃耆加倍倍用黃耆偏走表苦堅妙用斂浮陽陳修園曰陰虛火擾之汗得當歸熟地生地之滋陰又得黃芩黃連之瀉火治汗之本也然此方之妙則在於苦寒寒則勝熱而苦復能堅之又恐過於苦寒傷其中氣中者陰之守也陰愈虛則火愈動火愈動則汗愈出尤妙在大苦大寒墜中倍加黃耆俾黃耆領苦寒之性盡達於表以堅汗孔不使留中而為害此旨甚微注家向多誤解特表而出之耆附湯衛陽不固汗汪洋須用黃耆附子湯黃耆一兩熟附子五錢水煎服附暖丹田元氣主得耆固脫守其鄉行於皮毛者衛外之氣也衛氣根於元氣黃耆雖專走衛有附子挾之同行則能回大汗欲脫之氣守於其鄉而汗自止矣陳修園曰神農本草經云黃耆氣味甘微溫無毒主癰疽久敗瘡排膿止痛大瘋癩疾五痔鼠瘻補虛小兒百病本經只此三十三字皆取其質輕味淡偏走皮毛故治大風癰疽及一切外症膿血過多用之補養皮肉之虛而已又云主小兒百疾者以輕薄之品大人不足倚賴惟小兒經脈未盛氣血皆微不宜峻補得此微補之品百病可以概治也細味經旨安能大補元氣以止汗如六黃湯之大寒以除熱熱除則汗止耆附湯之大熱以回陽陽回則汗止玉屏風之解肌以驅風風除則汗止三方不重在黃耆卻得黃耆之輕快徑走皮膚奏效更速數百年來無一人談及甚矣醫道之難也玉屏風散玉屏風散主諸風止汗先求漐漐通風傷衛則汗自出黃耆得防風其功愈大以二藥同行走表令漐漐微似汗其風邪從微汗而解則衛無邪擾汗不再出矣發在耆防黃耆防風時醫誤認為止汗之品害人無算收在術表風得黃耆防風而解則外無所擾矣臟氣得白朮而安則內有所據矣熱除風屬陽邪陽則為熱濕去太陽為濕土濕熱交蒸則為自汗發熱之症主中宮白朮補中宮上氣故能止汗除熱防風黃耆白朮各等分為末酒調服陳修園曰以黃耆為固表藥千古貽誤前賢用之不應所以有汗能止無汗能發騎牆之説及庸輩有炙用能止生用能發之分也神農本經俱在奈何舍而不讀也余於本條小注甚詳細心體認如撥雲見日明者自知威喜丸治元陽虛憊精滑白濁遺尿及婦人血海久冷淫帶夢泄等症和劑傳來威喜丸夢遺帶濁服之安茯苓煮曬和黃蠟專治陽虛血海寒白茯苓去皮四兩切塊用豬苓二錢五分同於瓷器內煮二十餘沸去豬苓取出曬乾為末黃蠟四兩熔化攪和茯苓末為丸如彈子大每空心細嚼滿口生津徐徐咽服以小便清利為效忌米醋尤忌氣怒動情王普三曰抱朴子雲茯苓千萬歲其上生小木狀似蓮花名威喜芝今以名方者須擇雲茯苓之年深質結者制以豬苓導之下出前陰蠟淡歸陽不能入陰須用黃蠟性味緩澀有續絶補髓之功專調斫喪之陽分理潰亂之精故治元陽虛憊而為遺濁帶下者若治肺虛痰火久嗽茯苓不必結而豬苓亦可不用矣濟生烏梅丸治大便下血如神下血淋漓治頗難濟生遺下烏梅丸殭蠶炒研烏梅搗醋下幾回病即安殭蠶一兩炒烏梅肉一兩半共為末醋糊丸桐子大每服四五十丸空心醋湯下陳修園曰簡斗門祕傳方治毒痢腑臟撮痛膿血赤白或下血片日夜無度及噤口惡痢他藥不能治者立見神效又歌斗門治痢有神方豆芍榆甘粟殼薑臟腑撮疼膿血片垂危噤口並無妨斗門治痢有奇方黑豆乾薑芍藥良甘草地榆罌粟殼血膿噤口並堪嘗乾薑四錢黑豆一兩五錢炒去皮罌粟殼八錢蜜炙地榆甘草各六錢白芍三錢分三四帖水一鍾半煎八分服陳修園曰甘草黑豆能解諸毒毒解則撮痛除赤白已毒氣不衝於胃口而噤口之病亦寧又用地榆以燥在下之濕芍藥以泄在下之熱是正佐法乾薑之大辛大溫以開在上之拒格是反佐法又用罌粟殼以止劇痛制以白蜜之滑以變其澀是巧佐法鴉片是罌粟之膏脂入土者製造而成名為阿芙蓉今人吃其煙多受其害若以一二釐入藥止心腹之痛如神所以取效倍於他藥也聖濟附子丸治洞泄寒中注下水穀或痢赤白食已即出食物不消附子丸中連與薑烏梅炒研佐之良寒中瀉痢皆神驗互用溫涼請細詳附子炮烏梅肉炒各一兩黃連炒二兩乾薑炒一兩為末煉蜜丸桐子大米飲下三十丸按原注云春傷於風邪氣流連至夏發為餐泄至長夏發為洞泄陰生於午至未為甚長夏之時脾土當旺脾為陰中之至陰故陰氣盛陰氣既盛則生內寒而洞泄矣四神丸治脾腎雙虛子後作瀉不思食不化食腎水受時於子弱土不能禁制故子後每瀉四神故紙與吳萸肉蔻除油五味須大棗須同薑煮爛破故紙四兩酒浸炒吳萸一兩鹽水炒肉豆蔻二兩面裹煨五味子三兩炒大棗四十九枚生薑四兩同煎棗爛去薑搗棗肉為丸臨睡鹽湯下若早服不能敵一夜之陰寒也五更腎瀉火衰扶柯韻伯曰瀉利為腹疾而腹為三陰之都會一臟不調便能瀉利故三陰下利仲景各為立方以主之大陰有理中四逆厥陰有烏梅丸白頭翁湯少陰有桃花真武豬苓豬膚四逆湯散白通通脈等劑可謂曲盡病情諸法備美然只為一臟立法若三臟相關久留不痊如子後作瀉一症猶未之及也夫雞鳴至平旦天之陰陰中之陽也因陽氣當至而不至虛邪得以留而不去故作瀉於黎明其由有四一為脾虛不能制水一為腎虛不能行水故二神丸君補骨脂之辛燥者入腎以制水佐肉豆蔻之辛溫者入脾以暖土丸以棗肉又辛甘發散為陽也一為命門火衰不能生土一為少陽氣虛無以發陳故五味子散君五味子之酸溫以收坎宮耗散之火少火生氣以培土也佐吳茱萸之辛溫以順肝木欲散之勢為水氣開滋生之路以奉春生也此四者病因雖異而見症則同皆水亢為害二神丸是承製之劑五味散是化生之劑也二方理不同而用則同故可互用以助效亦可合用以建功合為四神丸是制生之劑也制生則化久泄自瘳矣稱曰四神比理中八味二丸較速歟金鎖固精丸金鎖固精芡實研蓮鬚龍牡蒺藜連又將蓮粉為糊合夢泄多遺久服蠲芡實蒸蓮蕊須沙苑蒺藜炒各二兩龍骨酥炙牡蠣鹽水煮一日夜煅粉各三兩蓮子粉為糊丸鹽湯或酒下陳修園曰此方彙集藥品毫無意義即市中搖鈴輩店上買藥輩亦能製造張景嶽新方亦多類此若輩喜為平穩而説之修園不阿好也封髓丹治夢遺失及與鬼交妄夢遺精封髓丹砂仁黃柏草和丸砂仁一兩黃柏二兩炙甘草七錢蜜丸每服三錢淡鹽湯送下一本用肉蓯蓉五錢切片洗淡酒浸一宿次日煎三四沸食前送下大封大固春長在巧奪先天造化立陳修園曰此方庸醫每疑其偏寒少補而不敢用而不知大封大固之妙實奪造化之權視金鎖固精奚啻天淵之隔寶鑑合三才湯料名為三才封髓丸則板實不靈矣趙羽皇方論最妙宜熟讀之趙羽皇曰經云腎者主水受五臟六腑之精而藏之又曰腎者主蟄封藏之本精之處也蓋腎為慳臟多虛少實因肝木為子偏喜疏泄母氣厥陰之火一動精即隨之外溢況肝又藏魂神魂不攝宜其夜臥思交精泄之症出矣封髓丹為固精之要藥方用黃柏為君以其味性苦寒苦能堅腎腎職得堅則陰水不虞其泛溢寒能清肅秋令一至則龍火不至於奮陽水火交攝精有不安其位者乎佐以甘草以甘能緩急瀉諸火與肝火之內煩且能使水土合為一家以妙封藏之固若縮砂者以其味辛性溫善能入腎腎之所惡在燥而潤之者惟辛縮砂通三焦達津液能納五臟六腑之精而歸於腎腎家之氣納腎中之髓自藏矣真人養臟湯真人養臟湯羅謙甫木香訶粟殼當歸肉蔻科術芍桂參甘草共脫肛久痢即安和訶子麵裹煨一兩二錢罌粟殼去蒂蜜炙三兩六錢肉豆蔻麵裹煨五錢當歸白朮炒白芍酒炒人參各六錢木香二兩四錢桂八錢生甘草一兩八錢每服四錢臟寒甚加附子宜方無當歸一方有乾薑肛脫由於虛寒參朮甘草以補其虛官桂豆蔻以溫其寒木香調氣當歸和血芍藥以止痛訶子粟殼以止脫陳修園曰此匯藥治病市醫得意之方修園獨以為否然用木香之多則澀而不郁亦是見解超處濕可潤燥清燥救肺湯主治諸氣膹郁諸痿喘嘔救肺湯中參草麻石膏膠杏麥枇杷經霜收下干桑葉解鬱滋干效可誇經霜桑葉三錢石膏煅二錢五分甘草黑脂麻各一錢人參杏仁去皮尖各七分真阿膠八分枇杷葉去毛蜜炙一片麥冬一錢二分水煎熱服痰多加貝母血枯加生地熱甚加犀角羚羊角陳修園曰喻嘉言制此方自注云諸氣膹郁之屬於肺者屬於肺之燥也諸痿喘嘔之屬於上者亦屬於肺之燥也古人以辛香之品解鬱固非燥症所宜即用芩連瀉火之品而苦先入心反從火化又非所宜也喻氏宗繆仲醇甘涼滋潤之法製出此方名曰清燥實以滋水即易所謂潤萬物者莫潤乎水是也名曰救肺實以補胃以胃土為肺金之母也最妙是人參一味仲景於咳嗽症去之者以其不宜於風寒水飲之咳嗽也昔醫不讀本草經疑仲景之法而試用之用之增劇遂有肺熱還傷肺之説以人參為肺熱之禁藥不知人參為肺寒之禁藥為肺熱肺燥之良藥也扁鵲云損其肺者益其氣舍人參之甘寒何以瀉壯火而益氣哉瓊玉膏瓊玉膏中生地黃參苓白蜜煉膏嘗肺枯乾咳虛勞症金水相滋效倍彰鮮生地四斤取汁一斤同白蜜二斤熬沸用絹濾過將茯苓十二兩人參三兩各研末入前汁和勻以瓷瓶用紙十數層加箬葉封瓶口入沙鍋內以長流水淹瓶頸桑柴火煮三晝夜取出絹紙扎口以蠟封固懸井中一日取起仍煮半日湯調服陳修園曰人參甘寒柔潤補助肺氣然肺本惡寒凡咳嗽多屬形寒飲冷得寒潤滋補之藥必增其咳昔醫誤認為溫寒之性故有肺熱還傷肺之説不知肺合皮毛凡咳嗽從風寒外傷而起宜用乾薑五味細辛之類加減忌用人參之寒然肺為臟腑之華蓋臟腑之火不得水制上刑肺金致肺燥乾咳有聲無痰與寒飲作嗽者不同正宜用人參之潤而滋燥人參之寒以制熱瓊玉膏所以神效無比也昔醫凡清燥之方必用人參可知其長於養津液也生脈散治熱傷元氣氣短倦怠口乾出汗生脈冬味與參施暑熱刑金脈不支若認脈虛通共劑操刀之咎屬伊誰人參五分麥冬八分五味子九分水煎服陳修園曰脈資始於腎資生於胃而會於肺仲景於手足冷脈微欲絶症取通脈四逆湯以扶少陰之真陽於心下悸脈結代取復脈湯以滋陽明之津液皆救危之方也孫真人制生脈散為暑熱傷肺肺傷則脈漸虛散為足慮宜於未傷之前取人參麥冬之甘潤五味子之酸斂無病之時預服以保之除暑月之外不可以此為例也今人惑於生脈之名凡脈絶之證每投立死亦孫真人命名不正之貽禍也一本作參麥散較妥燥可去濕神木湯主治三時外感寒邪內傷生冷而發熱及脾泄腸風術防甘草濕家嘗蒼朮三錢防風二錢甘草一錢加蔥白生薑同煎據云無汗用蒼朮以代麻黃湯有汗用白朮以代桂枝湯神術名湯得意方自説法超麻桂上可知全未夢南陽仲景居南陽王海藏以此方代麻黃湯桂枝湯可知南陽之法未嘗夢見也陳修園曰仲景麻桂及葛根柴胡等湯步步是法而大旨在養津液三字王海藏此方燥烈傷陰先涸汗源多致留邪發熱正與仲景法相反據云用代麻桂諸湯平穩可法其實貽禍匪輕也須知此方與三陽之症無涉惟大陰之風濕可用內經謂春傷於風邪氣流連而洞泄至夏而餐泄腸澼者宜此燥劑否則不可沾唇平胃散治濕淫於內脾胃不能剋制有積飲痞隔中滿者平胃散用朴陳皮蒼朮合甘四味宜蒼朮泔浸二錢厚朴薑汁炒陳皮甘草炙各一錢薑棗煎除濕寬胸驅瘴癘調和胃氣此方施柯韻伯曰內經以土運太過曰敦阜其病腹滿不及曰卑監其病留滿痞塞張仲景制三承氣湯調胃土之敦阜李東垣制平胃散平胃土之卑監也培其卑而使之乎非削卑之謂也蒼朮苦溫運脾長於發汗迅於除濕故以為君厚朴色赤苦溫能助少火以生氣故以為臣濕因於氣滯故以行氣之陳皮為佐脾得補而健運故以補脾之甘草為使名曰平胃實所以調脾歟五皮散五皮飲用五般皮陳茯薑桑大腹奇陳皮茯苓皮薑皮桑白皮大腹皮或用五加易桑白脾虛膚脹此方宜脾不能為胃行其津液故水腫半身以上宜汗半身以下宜利小便此方於瀉水之中仍寓調補之意皆用皮者水溢皮膚以皮行皮也陳修園曰此方出華元化中藏經頗有意義宜審其寒熱虛實而加寒溫補瀉之品二陳湯治肥盛之人濕痰為患痰喘脹滿二陳湯用夏和陳益以茯苓甘草臣半夏二錢陳皮一錢茯苓三錢炙甘草八分加薑煎利氣調中兼去濕諸凡痰飲此為珍陳修園曰此方為祛痰之通劑也痰之本水也茯苓制水以治其本痰之動濕也茯苓滲濕以鎮其動方中只此一味是治痰正藥其餘半夏降逆陳皮順氣甘草調中皆取之以為茯苓之佐使耳故仲景書凡痰多者俱加茯苓嘔者俱加半夏古聖不易之法也今人不窮古訓以半夏為祛痰之專品仿稀涎散之法制以明礬致降逆之品反為湧吐堪發一嘆以此方為三陽解表之劑服之留邪生熱至死不悟余於真方桂枝湯下已詳言之茲不復贅萆薢分清飲萆薢分清主石蒲草梢烏藥智仁俱烏藥益智仁石菖蒲萆薢各等分甘草梢減半煎成又入鹽些少加鹽少許淋濁流連數服驅遺精白濁汪訒庵曰萆薢能泄厥陰陽明濕熱去濁分清烏藥疏逆氣而止便數益智固脾腎而開鬱結石菖蒲開九竅而通心甘草梢達腎莖而止痛使濕熱去而心腎通氣化行而淋濁止矣此以疏泄為禁止者也腎著湯治寒濕腰痛如帶五千錢此帶豚為病名曰腎著腰痛如帶五千錢腎著湯方豈偶然甘草茯苓薑與術長沙老法譜新編甘草二錢白朮乾薑茯苓各四錢水煎服即金匱甘草乾薑茯苓白朮湯但分兩多少不同陳修園曰帶脈為病腰溶溶如坐水中此寒濕之邪不在腎之中臟而在腎之外腑故其治不在溫腎而散寒而在燠土以勝水若用桂附則反傷腎之陰矣一味白朮酒治傷濕身盡痛即白朮一兩酒煎服不能飲者以水代之按神農本草經云白朮氣味甘溫無毒主風寒濕痹死肌痙疽止汗除熱消食作煎餌久服輕身延年不飢原文只此三十四字陳修園曰白朮主治風寒濕三者今而成痹而除濕之功則更大焉死肌者濕邪侵肌肉而麻木不仁也痙者濕流關節而筋徑急也疸者濕乘脾土肌肉發黃也濕久鬱而為熱濕熱交蒸故自汗而熱發也脾受濕則失其健運之常故食不能消也白朮性能燥濕所以主之作煎餌三字先聖另提大費苦心以白朮之功在燥而所以妙處在於多脂多脂則燥中有潤張隱菴解云土有濕氣始能灌溉四旁如地得雨露始能發生萬物今以生術削去皮急火炙令熱名為煎餌遵法修治則味甘而質潤土氣和平故久服有輕身延年不飢之效後人用土炒燥大失經旨葉天士臨症指南竟用水漂炒黑是徒用白朮之名也不得不附辨於此寒能勝熱瀉白散瀉白甘桑地骨皮再加粳米四般宜桑白皮地骨皮各一錢甘草五分粳米百粒汪云桑皮瀉肺火地骨退虛熱甘草補土生金粳米和中清肺李時珍曰此瀉肺諸方之準純也秋傷燥令成痰嗽火氣乘金此法奇季楚重曰火熱傷氣救肺之治有三傷寒邪熱侮肺用白虎湯除煩此治其標內症虛火爍金用生脈散益陰此治其本若夫正氣不傷鬱火又甚則瀉白散之清肺調中標本兼治又補二方之不及也甘露飲治胃中濕熱包黃溺赤口瘡吐血衄血甘露二冬二地均天冬麥冬生地熟地枇杷芩枳黃芩枳殼枇杷葉斛茵倫石斛茵陳合和甘草平虛熱等分煎溫服口爛齦糜吐衄珍陳修園曰足陽明胃為燥土喜潤而惡燥喜降而惡升故以二冬二地石斛甘草之潤以補之枇杷枳殼之降以順之若用連柏之苦則增其燥若用耆朮之補則慮其升即有濕熱用一味黃芩以折之一味茵陳以滲之足矣蓋以陽明之治最重在養津液二字此方二地二冬等藥即豬苓湯用阿膠以育陰意也茵陳湯芩之折熱而去濕即豬苓湯中之用滑澤以除垢意也左金丸治肝藏實火左脅下痛或吐酸水香連丸治赤下痢茱連六一左金丸肝鬱脅疼吞吐酸黃連六兩吳茱萸一兩鹽湯泡名茱連丸更有痢門通用劑香連丸子服之安黃連二十兩以吳茱萸十兩水拌浸一宿同炒去吳茱萸木香四兩八錢五分二味共研末醋糊丸桐子大每服二三錢空心米湯下薛立齋治虛痢以四君子湯四物湯補中益氣湯隨宜送下陳修園曰肝實作痛惟肺金能平之故用黃連瀉心火不使剋金且心為肝子實則瀉其子也吳茱萸入肝苦辛大熱苦能引熱下行同氣相求之義也辛能開鬱散結通則不痛之義也何以謂之左金木從左而制從金也至於香連丸取黃連之苦以除濕寒以除熱且藉其苦以堅大便之滑況又得木香之行氣止痛溫脾和胃以為佐乎故久痢之偏熱者可以統治也溫膽湯治熱嘔吐苦虛煩驚悸不眠痰氣上逆溫膽湯方本二陳竹茹枳實合和勻二陳加竹茹枳實不眠驚悸虛煩嘔日暖風和木氣伸陳修園曰二陳湯為安胃祛痰之劑加竹茹以清隔上之虛熱枳實以除三焦之痰壅熱除痰清而膽自寧和即溫也溫之者實涼之也若膽家真寒而怯宜用龍牡桂枝湯加附子之類金鈴子散治心腹痛及脅痛等症脈洪數及服熱藥而增病者如神金鈴子散妙如神須辨諸疼作止頻火痛或作或止胡索金鈴調酒下延胡索金鈴子各等分研末以清酒調服三錢制方原是遠溫辛陳修園曰金鈴子引心包相火下行從小腸膀胱而出延胡索和一身上下諸痛配合得法所以效神丹參飲治心痛胃脘諸痛多效婦人更效心腹諸疼有妙方丹參十分作提綱檀砂一分聊為佐入咽咸知效驗彰丹參一兩檀香砂仁各一錢水一杯半煎七分服陳修園曰穩白合湯治心口痛服諸熱藥不效者亦屬氣痛久痛原來鬱氣凝若投辛熱痛頻增重需白合輕清品烏藥同煎亦準純白合一兩烏藥三錢水二杯煎七分服陳修園曰此方余從海壇得來用之多驗以上三方皆治心胃諸痛服熱藥而不效者宜之古人治痛俱用通法然通之之法各有不同調氣以和血調血以和氣通也上逆者使之下行中結者使之旁達亦通也虛者助之使通寒者溫之使通無非通之之法也若必以下泄為通則妄矣此説本之高士宗醫學正傳士宗名世拭浙江人也著有靈樞直解素問直解等書行世滋腎丸治肺痿聲嘶喉痹咳血煩躁即通關丸見通劑羅東逸曰此丸為腎家水竭火炎而設夫水竭則腎涸腎涸則下泉不鍾而陽盛於上斯喉痹痰結煩躁之症作火炎則金傷金傷則上源不澤無以蒸詬布漚斯聲嘶咳血焦痿之症生此時以六味補水水不能遽生也以生脈保金金不免猶燥也惟急用黃柏之苦以堅腎則能伏龍家之沸火是謂浚其源而安其流繼用知母之清以涼肺則能全破傷之燥金是謂沛之兩而騰之露然恐水火之不相入而相射也故益以肉桂之反佐為用兼以導龍歸海於是坎盈窞而流漸長矣此滋腎之旨也柯韻伯曰水為腎之體火為腎之用人知腎中有水始能制火不知腎中有火始能致水耳蓋天一生水者陽氣也即火也氣為水母陽為陰根必火有所歸斯水有所主故反佐以桂之甘溫引知柏入腎而奏其效此相須之殷亦承製之理也地骨皮散治陰虛火旺骨蒸發熱日靜夜劇者婦人熱入血室胎前發熱者即四物湯加地骨皮牡丹皮各三錢四物湯見補劑柯韻伯曰陰虛者陽必湊之故熱仲景曰陰弱則發熱陽氣下陷入陰中必發熱然當分三陰而治之陽邪陷入太陰脾部當補中益氣以升舉之清陽復位而火自熄也若陷入少陰腎部當六味地黃丸以對待之壯永之主而火自平也陷入厥陰肝部當地骨皮飲以涼補之血有所藏而火自安也四物湯為肝家滋陰調血之劑加地骨皮清志中之火以安腎補其母也加牡丹皮清神中之火以涼心瀉其子也二皮涼而不潤但清肝火不傷脾胃與四物加知柏之濕潤而苦寒者不同矣故逍遙散治肝火之鬱於本臟者也木鬱達之順其性也地骨皮飲治陽邪之陷於肝臟也客者除之勿縱寇以遺患也二者皆肝家得力之劑清暑益氣湯長夏濕熱蒸炎四肢困倦精神減少身熱氣高煩心便黃口渴而自汗脈虛者此方主之清暑益氣草參耆麥味青陳曲柏奇二木葛根升澤瀉暑傷元氣此為宜人參黃耆甘草炙當歸麥冬五味青皮陳皮神麯黃柏葛根蒼朮白朮升麻澤瀉薑棗煎參吳鶴皋方考暑令行於夏至長夏則兼濕令矣此方兼而治之炎暑則表氣易泄兼濕則中氣不固黃耆輕清散表氣又能領人參五味之苦酸同達於表以實表神麯消磨傷中氣又能佐白朮甘草之甘溫消補互用以調中酷暑橫流肺金受病人參五味麥冬所以補肺斂肺清肺經所謂扶其所不勝也火盛則水衰故以黃柏澤瀉滋其化源津液亡則口渴故以當歸乾葛生其胃液清氣不升升麻可升濁氣不降二皮可降蒼朮之用為兼長夏濕也龍膽瀉肝湯治脅痛口苦耳聾耳腫筋痿陰濕熱癢陰腫血濁溲血龍膽瀉肝通澤柴車前生地草歸偕梔芩一派清涼品濕熱肝邪力可排膽草三分梔子黃芩澤瀉柴胡各一錢車前子木通各五分當歸三分甘草生地各三分龍膽柴胡瀉肝膽之火佐以黃芩梔子木通車前澤瀉俾濕火從小便而出也然瀉之過甚恐傷肝血故又以生地當歸補之肝苦急急食甘以緩之故以甘草緩其急且欲以大甘之味濟其大苦不令過於泄下也當歸蘆薈丸治肝經實火頭暈目眩耳聾耳鳴驚悸搐搦躁擾狂越大便祕結小便澀滯或胸脅作痛陰囊腫脹凡屬肝經實火皆宜服之當歸蘆薈黛梔將木麝二香及四黃龍膽其成十一味諸凡肝火盡能攘當歸膽草酒洗梔子黃連黃柏黃芩各一兩大黃青黛水飛蘆薈各五錢木香二錢五分麝香五分炒神麯糊丸薑湯下每服二十丸陳修園曰五臟各有火而肝火最橫肝火一動每挾諸經之火相持為害故以青黛蘆薈龍膽入本經而直折之又以黃芩瀉肺火黃連瀉心火黃柏瀉腎火梔子瀉三焦火分諸經而瀉之而最橫之肝火失其黨援而乃平然火旺則血虛故以當歸之補血者為君火旺則胃實故以大黃之通滯者為臣氣有餘便是火故以麝香之主持正氣神麯之化導積氣木香之通行滯氣者為佐氣降火亦降自然之勢也況又得芩連梔柏分瀉各經青黛蘆薈龍膽直折本經內外應合以為之使乎立法最奇向來為庸解所掩茲特闡之犀角地黃湯主治吐衄便血婦人血崩赤淋犀角地黃芍藥丹生地兩半白芍一兩丹皮犀角各二錢半每服五錢血升胃熱火邪干斑黃陽毒皆堪治或益柴芩總伐肝柯韻伯曰氣為陽血為陰陽密乃固陽盛則傷陰矣陰平陽祕陰虛者陽必湊之矣故氣有餘即是火火入血室血不營經即隨逆氣而妄行上升者出於口鼻下陷者出於二便雖有在經在腑之分要皆心肝受熱所致也心為營血之主心火旺則血不寧故用犀角生地酸鹹甘寒之味以清君火肝為藏血之室肝火旺則血不守故用丹皮芍藥辛苦微寒之品以平相火此方雖曰清火而實滋陰之劑蓋血失則陰虛陰虛則無氣故陰不足者當補之以味勿得反傷其氣也若用芩連膽草梔柏以瀉其氣則陽之劇者苦從火化陽已衰者氣從苦發燎原而飛越矣四生丸治陽盛陰虛血熱妄行或吐或衄者四生丸用葉三般艾柏鮮荷生地斑生側柏葉生艾葉生荷葉生地黃各等分共搗成團入水化血隨火降一時還搗為丸如雞子大每服一丸滾湯化下柯韻伯曰心腎不交則五臟齊損陰虛而陽無所附則火炎上焦陽盛則陽絡傷故血上溢於口鼻也凡草木之性生者涼而熟之則溫熟者補而生者瀉四味皆清寒之品盡取其生者而搗爛為丸所以全其水氣不經火煮更以遠於火令矣生地多膏清心腎而通血脈之源柏葉西指清肺經而調營衛之氣艾葉芳香入脾胃而和生血之司荷葉法震入肝家而和藏血之室五臟安堵則水火不相射陰平陽祕而血歸經矣是方也可暫用以遏妄行之血如多用則傷營蓋血得寒則瘀血不散而新血不生也設但知清火涼血而不用歸脾養營等劑以善其後鮮有不綿連歲月而斃者非立方之不善妄用者之過耳熱可制寒回陽急救湯回陽急救節庵用六君桂附乾薑五味群附子炮乾薑肉桂人參各五分白朮茯苓各一錢半夏陳皮各七分甘草三分五味九粒薑水煎加麝三釐或膽汁三陰寒厥見奇勳薑桂附子祛其陰寒六君子湯補助其陽氣五味人參以生其脈加麝香者以通其竅加膽汁者熱因寒用也陳修園曰此市醫得意方也修園不釋益元湯益元艾附與乾薑麥味知連參草將附子炮艾葉乾薑麥冬五味知母黃連人參炙甘草艾葉辛熱能回陽蔥白童便為引導內寒外熱是慈航此陰盛格陽之症面赤口渴欲臥於泥水之中為外熱內寒此湯薑附艾葉加知連等藥與白通加人尿豬膽汁同意乃熱因寒藥為引用也內熱曰煩為有根之火外熱不寧曰躁為無根之火故但躁不煩及先躁後煩者皆不治濟生腎氣丸腎氣丸名別濟生車前牛膝合之成熟地四兩茯苓三兩山藥山茱丹皮澤瀉肉桂車前子牛膝各一兩附子五錢蜜丸空心米湯送下膚膨腹腫痰如壅氣化縕絪水自行張景嶽曰地黃山藥丹皮以養陰中之真水山茱桂附以化陰中之陽氣茯苓澤瀉車前牛膝以利陰中之滯能使氣化於精即所以治肺也補火生土即所以治脾也壯水利竅即所以治腎也水腫乃肺脾腎三臟之病此方所以治其本三生引治卒中昏不知人口眼喎斜半身不遂並痰厥陰厥三生飲用附烏星香入些微是引經生南星一兩生川烏生附子各去皮各五錢木香二錢參汁對調宗薛氏每服一兩加參一兩風痰卒倒效神靈柯韻伯曰風為陽邪風中無寒不甚傷人惟風中挾寒害始劇矣寒輕而在表者宜發汗以逐邪寒重而入里者非溫中補虛終不可救此取三物之大辛大熱者且不炮不制更佐以木香乘其至剛至鋭之氣而用之非以治風實以治寒也然邪之所湊其氣必虛但知勇於攻邪若正氣虛而不支能無倒戈之患乎必用人參兩許以駕馭其邪此立齋先生真知確見立於不敗之地而獲萬全之效者也若在庸手必謂補住邪氣而不敢用此謹熟陰陽毋與衆論岐伯所以叮嚀致告耳觀其每服五錢必四服而邪氣始出今之畏事者用烏附數分必制熱而後敢用更以芩連濫制之焉能挽回如此危症哉古今人不相及如此參附湯朮附湯耆附湯見澀劑陰盛陽虛汗自流腎陽脫汗附參求人參一兩熟附子五錢水煎服名參附湯脾陽遏郁術和附白朮一兩熟附子五錢名朮附湯若是衛陽耆附投黃耆一兩熟附子五錢名耆附湯喻嘉言曰衛外之陽不固而自汗則用耆附脾中之陽遏鬱而自汗則用朮附腎中之陽浮遊而自汗則用參附凡屬陽虛自汗不能捨三方為治三方之用大矣然耆附可以治虛風朮附可以治寒濕參附可以壯元神三者亦交相為用若用所當用功效若神誠足貴也近效白朮湯即朮附湯減半加炙甘草一錢五分生薑三片紅棗二枚水煎服治風虛頭重眩苦極不知食味暖肌補中益精氣喻嘉言曰此方治腎氣空虛之人外風入腎恰似鳥洞之中陰風慘慘晝夜不息風挾腎中濁陰之氣致逆上攻其頭間重眩之苦至極難耐兼以胃氣亦虛不知食味故方中全不用風門藥但用附子暖其水藏白朮甘草暖其土藏水土一暖則濁陰之氣盡趨於下而頭苦重眩及不知食味之證除矣試觀冬月井中水暖土中氣暖其濁陰之氣其不能出於地豈更能加於天乎制方之義可謂精矣此所以用之而獲近效也陳修園曰喻嘉言之解甚超但於益精氣三字而略之猶未識制方之神妙也蓋精者天一所生之水也一即陽也陽即氣也氣即火也氣為水母陽為陰根川流不息水之行即火之用也故方中君以附子脾腎中有火以致水水自不窮俗醫以熟地枸杞之類滋潤為補譬之無源之水久停則汙穢不堪矣況本方中又有白朮甘草暖其土藏脾納穀多則津液旺充血生精以復其真陰之不足難經所謂損其腎者益其精內經所謂精不足者補之以味此方深得聖經之旨矣故分而言之經云兩神相搏合而成形嘗先身生是謂精附子補腎中之神所以益精經又云上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣白朮甘草入脾而宣布其氣所以益氣合而言之精由氣化氣由精生非一亦非兩也悟得此方之妙便知六味丸退熱則有餘補水則不足六味丸化氣行水則有餘補火致水則不足他若張景嶽自制大補元煎等湯竟云補血補精以熟地黃為主少則二三錢多則一二兩無知妄作誤人匪少何陳遠公之石室祕籙辨症奇聞馮楚瞻之錦囊專宗此説衆盲為一盲所引是可慨也附子理中湯即理中湯見真方歌括太陰篇加附子炮二錢陳修園曰理中湯以參草補陰薑朮補陽和平之藥以中焦為主上交於陽下交於陰為吐瀉等症而立法原無加附子之法若加附子則偏重下焦不可名為理中矣然脾腎俱寒吐後而大瀉不止須用附子回其真陽而門戶始固必重加此一味而後效但既加附子而仍名理中命名不切此所以為時方也又有再加肉桂名桂附理中湯則立方不能無弊矣蓋以吐瀉陰陽兩脫若用肉桂宣太陽之腑氣動少陰之臟氣恐致大汗為亡陽之壞症也雞鳴散治腳氣第一品藥不問男女皆可服如感風濕流注腳痛不可忍筋脈浮腫者並宜服之其效如神雞鳴散是絶奇方蘇葉茱萸桔梗薑瓜橘檳榔煎冷服浮腫腳氣效彰彰檳榔七枚橘紅木瓜各一兩吳茱萸蘇葉各三錢桔梗生薑各半兩水二大碗漫火煎至一碗半取渣再入水兩碗煎取一小碗兩汁相和安置床頭次日五更分三五次冷服之冬月略溫亦可服藥至天明當下黑糞水即是腎家所感寒濕之毒氣也至早飯時必痛住腫消只宜遲吃飯使藥為作效此方並無所忌陳修園曰寒濕之氣著於下焦而不去故用生薑吳茱萸以驅寒橘紅檳榔以除濕然驅寒除濕之藥頗多而數品皆以氣勝加以紫蘇為血中之氣藥辛香撲鼻更助其氣氣盛則行速取著者行之之義也又佐以木瓜之酸桔梗之苦經云酸苦湧泄為陰俾寒濕之氣得大氣之藥從微汗而解之解之而不能盡者更從大便以泄之戰則必勝之意也其服於雞鳴時奈何一取其空腹則藥力專行一取其陽盛則陽藥得氣也其必冷服奈何以濕為陰邪冷汁亦為陰屬以陰從陰混為一家先誘之而後攻之也
